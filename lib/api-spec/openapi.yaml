openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Global Barber Corp API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: barbers
    description: Barber profiles
  - name: salons
    description: Salon management
  - name: services
    description: Barber services
  - name: reservations
    description: Booking system
  - name: reviews
    description: Reviews and ratings
  - name: subscriptions
    description: Subscription plans
  - name: financing
    description: Financing requests
  - name: conferences
    description: Barber conferences
  - name: notifications
    description: Push notifications
  - name: gallery
    description: Photo gallery
  - name: stats
    description: Statistics and analytics
  - name: admin
    description: Admin operations
  - name: storage
    description: Object storage upload and serving endpoints.

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── AUTH ──────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /auth/sync:
    post:
      operationId: syncAuth
      tags: [auth]
      summary: Sync Clerk identity with local profile (JIT provisioning)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncAuthInput"
      responses:
        "200":
          description: Synced user and optional barber profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSyncResult"

  # ── USER SELF-SERVICE ────────────────────────────────────────────────
  /users/me:
    patch:
      operationId: updateMe
      tags: [users]
      summary: Update own profile (name, phone, avatar, city, country)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/location:
    post:
      operationId: updateMyLocation
      tags: [users]
      summary: Update current user's geographic position
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateLocationInput"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── USERS (admin) ────────────────────────────────────────────────────
  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List all users (admin)
      parameters:
        - in: query
          name: role
          schema:
            type: string
            enum: [client, barber, admin]
        - in: query
          name: status
          schema:
            type: string
            enum: [active, suspended, pending]
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserListResponse"

  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get user by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    patch:
      operationId: updateUser
      tags: [users]
      summary: Update user
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
    delete:
      operationId: deleteUser
      tags: [users]
      summary: Delete user (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /users/{id}/suspend:
    patch:
      operationId: suspendUser
      tags: [users]
      summary: Suspend a user account (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/{id}/activate:
    patch:
      operationId: activateUser
      tags: [users]
      summary: Activate a user account (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: User activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── BARBERS ───────────────────────────────────────────────────────────
  /barbers:
    get:
      operationId: listBarbers
      tags: [barbers]
      summary: List barbers
      parameters:
        - in: query
          name: status
          schema:
            type: string
            enum: [pending, approved, rejected, suspended]
        - in: query
          name: city
          schema:
            type: string
        - in: query
          name: page
          schema:
            type: integer
        - in: query
          name: limit
          schema:
            type: integer
      responses:
        "200":
          description: List of barbers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarberListResponse"
    post:
      operationId: createBarber
      tags: [barbers]
      summary: Create barber profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarberInput"
      responses:
        "201":
          description: Created barber
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Barber"

  /barbers/me:
    get:
      operationId: getMyBarbers
      tags: [barbers]
      summary: Get all salons owned by the authenticated barber (array)
      responses:
        "200":
          description: Array of barber salons owned by current user
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Barber"
    post:
      operationId: createMySalon
      tags: [barbers]
      summary: Create a new salon for the authenticated barber
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarberInput"
      responses:
        "201":
          description: Created salon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Barber"
    patch:
      operationId: updateMySalon
      tags: [barbers]
      summary: Update the authenticated barber primary salon
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarberUpdate"
      responses:
        "200":
          description: Updated salon
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Barber"

  /barbers/me/revenue:
    get:
      operationId: getMyRevenue
      tags: [barbers]
      summary: Get revenue dashboard for authenticated barber
      parameters:
        - in: query
          name: salonId
          schema:
            type: integer
          description: Specific salon ID (for multi-salon barbers)
      responses:
        "200":
          description: Revenue data bucketed by period
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueData"

  /barbers/me/clients:
    get:
      operationId: getMyClients
      tags: [barbers]
      summary: Get client list for authenticated barber
      parameters:
        - in: query
          name: salonId
          schema:
            type: integer
      responses:
        "200":
          description: Client list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarberClientsResponse"

  /barbers/me/schedule:
    get:
      operationId: getMySchedule
      tags: [barbers]
      summary: Get weekly schedule for authenticated barber
      responses:
        "200":
          description: Weekly schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    put:
      operationId: updateMySchedule
      tags: [barbers]
      summary: Update weekly schedule for authenticated barber
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /barbers/{id}:
    get:
      operationId: getBarber
      tags: [barbers]
      summary: Get barber by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Barber
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Barber"
    patch:
      operationId: updateBarber
      tags: [barbers]
      summary: Update barber profile
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BarberUpdate"
      responses:
        "200":
          description: Updated barber
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Barber"

  /barbers/{id}/approve:
    patch:
      operationId: approveBarber
      tags: [barbers]
      summary: Approve barber account (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Barber approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Barber"

  /barbers/{id}/reject:
    patch:
      operationId: rejectBarber
      tags: [barbers]
      summary: Reject barber account (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RejectInput"
      responses:
        "200":
          description: Barber rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Barber"

  /barbers/{id}/suspend:
    patch:
      operationId: suspendBarber
      tags: [barbers]
      summary: Suspend barber account (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SuspendInput"
      responses:
        "200":
          description: Barber suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Barber"

  /barbers/{id}/reactivate:
    patch:
      operationId: reactivateBarber
      tags: [barbers]
      summary: Reactivate a suspended barber (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Barber reactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Barber"

  /barbers/{id}/schedule:
    get:
      operationId: getBarberSchedule
      tags: [barbers]
      summary: Get barber availability schedule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Barber schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"
    put:
      operationId: updateBarberSchedule
      tags: [barbers]
      summary: Update barber schedule
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScheduleInput"
      responses:
        "200":
          description: Updated schedule
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Schedule"

  /barbers/{id}/stats:
    get:
      operationId: getBarberStats
      tags: [barbers]
      summary: Get barber analytics
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Barber stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BarberStats"

  # ── HOME GALLERY (admin-managed homepage carousel) ───────────────────
  /home-gallery:
    get:
      operationId: listHomeGalleryPhotos
      tags: [gallery]
      summary: List homepage gallery photos (public)
      responses:
        "200":
          description: Photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HomeGalleryPhoto"
    post:
      operationId: addHomeGalleryPhoto
      tags: [gallery]
      summary: Add a homepage gallery photo (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HomeGalleryPhotoInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeGalleryPhoto"

  /home-gallery/{id}:
    patch:
      operationId: updateHomeGalleryPhoto
      tags: [gallery]
      summary: Update a homepage gallery photo (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HomeGalleryPhotoUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HomeGalleryPhoto"
    delete:
      operationId: deleteHomeGalleryPhoto
      tags: [gallery]
      summary: Delete a homepage gallery photo (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── ARTICLES (édito — admin-managed, public listing) ─────────────────
  /articles:
    get:
      operationId: listPublicArticles
      tags: [articles]
      summary: List published articles within active window (public)
      responses:
        "200":
          description: Articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"

  /articles/{id}:
    get:
      operationId: getPublicArticle
      tags: [articles]
      summary: Get a published article within active window (public)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found

  /admin/articles:
    get:
      operationId: listAdminArticles
      tags: [articles]
      summary: List all articles, incl. drafts (admin)
      responses:
        "200":
          description: Articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create an article (admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /admin/articles/{id}:
    get:
      operationId: getAdminArticle
      tags: [articles]
      summary: Get an article by id (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
    patch:
      operationId: updateArticle
      tags: [articles]
      summary: Update an article (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ArticleUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete an article (admin)
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── FAVORITES ─────────────────────────────────────────────────────────
  /favorites:
    get:
      operationId: listFavorites
      tags: [favorites]
      summary: List the authenticated client's favorite salons
      responses:
        "200":
          description: Favorite salons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Barber"
    post:
      operationId: addFavorite
      tags: [favorites]
      summary: Add a salon to favorites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/FavoriteInput"
      responses:
        "201":
          description: Added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Favorite"

  /favorites/{barberId}:
    delete:
      operationId: removeFavorite
      tags: [favorites]
      summary: Remove a salon from favorites
      parameters:
        - in: path
          name: barberId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # ── LOYALTY ───────────────────────────────────────────────────────────
  /barbers/{id}/loyalty:
    get:
      operationId: getMyLoyalty
      tags: [loyalty]
      summary: Loyalty status of the authenticated client at a given salon
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Loyalty status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltyStatus"

  /barbers/me/loyalty/redeem:
    post:
      operationId: redeemLoyalty
      tags: [loyalty]
      summary: Redeem an available free cut for one of the salon's clients (barber)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoyaltyRedeemInput"
      responses:
        "201":
          description: Redeemed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoyaltyStatus"
        "409":
          description: No free cut available

  /barbers/me/stats/advanced:
    get:
      operationId: getMyAdvancedStats
      tags: [barbers]
      summary: Advanced stats for the authenticated barber
      responses:
        "200":
          description: Advanced stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdvancedStats"

  # ── REALISATIONS (before/after) ───────────────────────────────────────
  /barbers/{id}/realisations:
    get:
      operationId: listBarberRealisations
      tags: [realisations]
      summary: Public list of a barber's before/after photos
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Realisations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Realisation"

  /barbers/me/realisations:
    get:
      operationId: listMyRealisations
      tags: [realisations]
      summary: List my before/after photos (barber)
      responses:
        "200":
          description: Realisations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Realisation"
    post:
      operationId: createRealisation
      tags: [realisations]
      summary: Add a before/after photo (barber)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RealisationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Realisation"

  /barbers/me/realisations/{realisationId}:
    delete:
      operationId: deleteRealisation
      tags: [realisations]
      summary: Delete a before/after photo (barber)
      parameters:
        - in: path
          name: realisationId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── WALK-IN QUEUE ─────────────────────────────────────────────────────
  /barbers/me/queue:
    get:
      operationId: listMyQueue
      tags: [queue]
      summary: List my walk-in queue (barber)
      responses:
        "200":
          description: Queue entries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/WalkIn"
    post:
      operationId: addWalkIn
      tags: [queue]
      summary: Add a walk-in to the queue (barber)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalkInInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalkIn"

  /barbers/me/queue/{entryId}:
    patch:
      operationId: updateWalkInStatus
      tags: [queue]
      summary: Update a walk-in status (barber)
      parameters:
        - in: path
          name: entryId
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WalkInStatusInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalkIn"
    delete:
      operationId: deleteWalkIn
      tags: [queue]
      summary: Remove a walk-in from the queue (barber)
      parameters:
        - in: path
          name: entryId
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── GALLERY ───────────────────────────────────────────────────────────
  /barbers/{id}/gallery:
    get:
      operationId: getBarberGallery
      tags: [gallery]
      summary: Get barber gallery
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Gallery photos
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GalleryPhoto"
    post:
      operationId: addGalleryPhoto
      tags: [gallery]
