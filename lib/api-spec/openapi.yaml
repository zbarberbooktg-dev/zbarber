components:
  schemas:
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    # ── AUTH ──────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
          minLength: 2
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        role:
          type: string
          enum: [client, barber]
        phone:
          type: ["string", "null"]

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string

    AuthResponse:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ── USER ──────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, name, email, role, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [client, barber, admin]
        status:
          type: string
          enum: [active, suspended, pending]
        phone:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        locationUpdatedAt:
          type: ["string", "null"]
          format: date-time
        createdAt:
          type: string
          format: date-time

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        phone:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        city:
          type: ["string", "null"]
        country:
          type: ["string", "null"]
        role:
          type: string
          enum: [client, barber, admin]

    UserListResponse:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    RejectInput:
      type: object
      properties:
        reason:
          type: ["string", "null"]

    SuspendInput:
      type: object
      properties:
        reason:
          type: ["string", "null"]

    # ── BARBER ────────────────────────────────────────────────────────
    Barber:
      type: object
      required: [id, userId, salonName, city, status, createdAt]
      properties:
        id:
          type: integer
        userId:
          type: integer
        salonName:
          type: string
        bio:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        city:
          type: string
        neighborhood:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        whatsapp:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]
        status:
          type: string
          enum: [pending, approved, rejected, suspended]
        profileViews:
          type: integer
        subscriptionPlanId:
          type: ["integer", "null"]
        rejectionReason:
          type: ["string", "null"]
        suspensionReason:
          type: ["string", "null"]
        rating:
          type: ["number", "null"]
        reviewCount:
          type: integer
        createdAt:
          type: string
          format: date-time

    BarberInput:
      type: object
      required: [salonName, city]
      properties:
        salonName:
          type: string
        bio:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        city:
          type: string
        neighborhood:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        whatsapp:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]

    BarberUpdate:
      type: object
      properties:
        salonName:
          type: string
        bio:
          type: ["string", "null"]
        logoUrl:
          type: ["string", "null"]
        city:
          type: string
        neighborhood:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        whatsapp:
          type: ["string", "null"]
        latitude:
          type: ["number", "null"]
        longitude:
          type: ["number", "null"]

    BarberListResponse:
      type: object
      required: [data, total, page, limit]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Barber"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    BarberStats:
      type: object
      required: [profileViews, totalClicks, monthlyReservations, totalReservations, popularServices]
      properties:
        profileViews:
          type: integer
        totalClicks:
          type: integer
        monthlyReservations:
          type: integer
        totalReservations:
          type: integer
        popularServices:
          type: array
          items:
            $ref: "#/components/schemas/ServiceStat"

    ServiceStat:
      type: object
      required: [serviceId, serviceName, count]
      properties:
        serviceId:
          type: integer
        serviceName:
          type: string
        count:
          type: integer

    # ── SCHEDULE ──────────────────────────────────────────────────────
    Schedule:
      type: object
      required: [barberId, workDays]
      properties:
        barberId:
          type: integer
        workDays:
          type: array
          items:
            $ref: "#/components/schemas/WorkDay"
        daysOff:
          type: array
          items:
            type: string
            format: date

    ScheduleInput:
      type: object
      required: [workDays]
      properties:
        workDays:
          type: array
          items:
            $ref: "#/components/schemas/WorkDay"
        daysOff:
          type: array
          items:
            type: string
            format: date

    WorkDay:
      type: object
      required: [day, isWorking]
      properties:
        day:
          type: string
          enum: [monday, tuesday, wednesday, thursday, friday, saturday, sunday]
        isWorking:
          type: boolean
        startTime:
          type: ["string", "null"]
        endTime:
          type: ["string", "null"]
        breakStart:
