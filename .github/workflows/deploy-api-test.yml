name: Deploy — api (test) → api.test.zbarber.net

# Manual only — push-to-test auto-deploy is handled by deploy-test.yml.
# Use this to redeploy ONLY the api service to test on demand.
on:
  workflow_dispatch:

concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -euo pipefail
            REPO=/srv/zbarber/test
            git -C "$REPO" fetch --depth=1 origin test
            git -C "$REPO" reset --hard origin/test
            bash "$REPO/deploy/deploy.sh" api test
