name: Deploy — all (test) → *.test.zbarber.net

# Auto-deploys the whole test platform on push to the `test` branch.
# Runs the three services sequentially in a single run so they never collide
# on the shared /srv/zbarber/test checkout. Can also be run manually.
on:
  push:
    branches: [test]
  workflow_dispatch:

concurrency:
  group: deploy-test
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || '22' }}
          script: |
            set -euo pipefail
            REPO=/srv/zbarber/test
            git -C "$REPO" fetch --depth=1 origin test
            git -C "$REPO" reset --hard origin/test
            bash "$REPO/deploy/deploy.sh" vitrine test
            bash "$REPO/deploy/deploy.sh" admin test
            bash "$REPO/deploy/deploy.sh" api test
