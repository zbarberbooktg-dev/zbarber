# Admin (test) — https://admin.test.zbarber.net
# Serves the static admin Vite build and proxies /api to the test API (127.0.0.1:5002).
# Run `certbot --nginx -d admin.test.zbarber.net` to add the TLS (443) block + redirect.
server {
    listen 80;
    listen [::]:80;
    server_name admin.test.zbarber.net;

    root /srv/zbarber/test/artifacts/admin/dist/public;
    index index.html;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
