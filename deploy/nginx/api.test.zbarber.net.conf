# API (test) — https://api.test.zbarber.net
# Dedicated direct entry to the test API (127.0.0.1:5002). Proxies everything,
# including the Clerk proxy path (/api/__clerk).
# Run `certbot --nginx -d api.test.zbarber.net` to add the TLS (443) block + redirect.
server {
    listen 80;
    listen [::]:80;
    server_name api.test.zbarber.net;

    client_max_body_size 25m;

    location / {
        proxy_pass http://127.0.0.1:5002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
