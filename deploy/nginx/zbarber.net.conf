# Vitrine (production) — https://zbarber.net
# Serves the static Vite build and proxies /api to the prod API (127.0.0.1:5001).
# Run `certbot --nginx -d zbarber.net` to add the TLS (443) block + redirect.
server {
    listen 80;
    listen [::]:80;
    server_name zbarber.net;

    root /srv/zbarber/prod/artifacts/vitrine/dist/public;
    index index.html;

    client_max_body_size 25m;

    location /api/ {
        proxy_pass http://127.0.0.1:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
